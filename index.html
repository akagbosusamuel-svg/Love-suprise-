<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Surprise 💝</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:#333;
    text-align:center;
}

.layer {
    display:none;
    padding:30px;
}

.active {
    display:block;
}

button {
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.envelope {
    font-size:80px;
    cursor:pointer;
}

.puzzle {
    display:grid;
    grid-template-columns:repeat(3,80px);
    gap:10px;
    justify-content:center;
}

.piece {
    background:#fff;
    height:80px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    cursor:pointer;
    border-radius:10px;
}

.lock {
    font-size:80px;
    cursor:pointer;
}

.scratch {
    background:gray;
    color:white;
    padding:40px;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<!-- LAYER 0 -->
<div class="layer active" id="layer0">
<h1>Hey Beautiful 💕</h1>
<p>I made something for you...</p>
<button onclick="start()">Start 💖</button>
</div>

<!-- LAYER 1 -->
<div class="layer" id="layer1">
<h1>Open this 💌</h1>
<div class="envelope" onclick="next(2)">💌</div>
</div>

<!-- LAYER 2 -->
<div class="layer" id="layer2">
<h1>Unlock all 💕</h1>

<div class="puzzle">
<div class="piece" onclick="reveal(this)">❤️</div>
<div class="piece" onclick="reveal(this)">💖</div>
<div class="piece" onclick="reveal(this)">💕</div>
<div class="piece" onclick="reveal(this)">💘</div>
<div class="piece" onclick="reveal(this)">💝</div>
<div class="piece" onclick="reveal(this)">🌹</div>
<div class="piece" onclick="reveal(this)">✨</div>
<div class="piece" onclick="reveal(this)">💫</div>
<div class="piece" onclick="reveal(this)">😍</div>
</div>

<br>
<button id="nextPuzzle" style="display:none;" onclick="next(3)">Continue</button>
</div>

<!-- LAYER 3 -->
<div class="layer" id="layer3">
<h1>Enter Code 🔐</h1>
<p>Hint: Love code</p>
<input id="code" placeholder="Enter code">
<br><br>
<button onclick="check()">Unlock</button>
<p id="error" style="color:red;display:none;">Wrong code</p>
</div>

<!-- LAYER 4 -->
<div class="layer" id="layer4">
<h1>Unlock my heart 💖</h1>
<div class="lock" onclick="next(5)">🔒</div>
</div>

<!-- LAYER 5 -->
<div class="layer" id="layer5">
<h1>Tap to reveal 🎁</h1>
<div class="scratch" onclick="revealFinal()">Tap here</div>
<br>
<button id="finalBtn" style="display:none;" onclick="next(6)">Final 💌</button>
</div>

<!-- FINAL -->
<div class="layer" id="layer6">
<h1>I Love You ❤️</h1>
<p>You mean everything to me.</p>
<button onclick="confetti()">Celebrate 🎉</button>
</div>

<script>

let current = 0;
let count = 0;

// start + music
function start(){
document.getElementById("music").play().catch(()=>{});
next(1);
}

// change layer
function next(n){
document.getElementById("layer"+current).classList.remove("active");
document.getElementById("layer"+n).classList.add("active");
current = n;
}

// puzzle
function reveal(el){
if(el.clicked) return;
el.style.background="#ff4d6d";
el.clicked = true;
count++;

if(count === 9){
document.getElementById("nextPuzzle").style.display="inline-block";
}
}

// code
function check(){
let val = document.getElementById("code").value;

if(val === "143"){
next(4);
}else{
document.getElementById("error").style.display="block";
}
}

// scratch
function revealFinal(){
document.querySelector(".scratch").innerHTML="You are my everything 💕";
document.getElementById("finalBtn").style.display="inline-block";
}

// confetti
function confetti(){
for(let i=0;i<50;i++){
let d=document.createElement("div");
d.style.position="fixed";
d.style.width="10px";
d.style.height="10px";
d.style.background="hsl("+Math.random()*360+",100%,50%)";
d.style.top="0";
d.style.left=Math.random()*100+"%";
document.body.appendChild(d);

setTimeout(()=>d.remove(),2000);
}
}

</script>

</body>
</html>
