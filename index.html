<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6a5acd,#ff6b81);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#333;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  max-width:320px;
  width:90%;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="box" id="step0">
  <h2>Hey Beautiful 💕</h2>
  <p>I made something for you...</p>
  <button id="start">Start</button>
</div>

<div class="box hidden" id="step1">
  <h2>💌 Tap the letter</h2>
  <button id="envelope">Open</button>
</div>

<div class="box hidden" id="step2">
  <h2>🧩 Click all boxes</h2>
  <div id="puzzle"></div>
  <button id="nextPuzzle" class="hidden">Continue</button>
</div>

<div class="box hidden" id="step3">
  <h2>🔐 Enter code</h2>
  <input id="code" placeholder="Type love" />
  <button id="check">Unlock</button>
</div>

<div class="box hidden" id="step4">
  <h2>💖 Tap heart</h2>
  <button id="heart">❤️</button>
</div>

<div class="box hidden" id="step5">
  <h2>🎁 Final Message</h2>
  <p>You mean everything to me ❤️</p>
  <p><b>Samuel 😎❤️</b></p>
</div>

<script>
let current=0;

function show(n){
  document.getElementById("step"+current).classList.add("hidden");
  document.getElementById("step"+n).classList.remove("hidden");
  current=n;
}

// start
document.getElementById("start").onclick=()=>show(1);

// envelope
document.getElementById("envelope").onclick=()=>show(2);

// puzzle
let puzzle=document.getElementById("puzzle");
let count=0;

for(let i=0;i<6;i++){
  let b=document.createElement("button");
  b.innerText="❓";
  b.onclick=function(){
    if(b.innerText==="❓"){
      b.innerText="❤️";
      count++;
      if(count===6){
        document.getElementById("nextPuzzle").classList.remove("hidden");
      }
    }
  };
  puzzle.appendChild(b);
}

document.getElementById("nextPuzzle").onclick=()=>show(3);

// code
document.getElementById("check").onclick=()=>{
  let val=document.getElementById("code").value.toLowerCase();
  if(val==="love"){
    show(4);
  }else{
    alert("Try again ❤️");
  }
};

// heart
document.getElementById("heart").onclick=()=>show(5);
</script>

</body>
</html>
